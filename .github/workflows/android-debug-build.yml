name: Android Debug Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-debug:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: libcore/go.sum

      - name: Setup Gradle 8.6
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.6

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Ensure local.properties
        shell: bash
        run: |
          SDK_ROOT="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "SDK_ROOT=$SDK_ROOT"
          ls -la "$SDK_ROOT" || true
          echo "sdk.dir=$SDK_ROOT" > local.properties
          cat local.properties

      - name: Accept licenses and install required Android packages
        shell: bash
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" "ndk;25.0.8775105"

      - name: Grant execute permission
        run: chmod +x gradlew run scripts/check-project.sh scripts/build-debug.sh

      - name: Prepare sing-box assets
        run: bash buildScript/lib/assets.sh

      - name: Build libcore AAR
        run: ./run lib core

      - name: Verify libcore artifact
        run: |
          test -f app/libs/libcore.aar
          ls -lh app/libs/libcore.aar

      - name: Project check
        run: ./scripts/check-project.sh

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: xboard-client-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
